<script>
(function(){
  const legend = document.getElementById('map-legend');
  const btn = document.getElementById('legendToggle');
  const layers = document.querySelector('.leaflet-control-layers');
  const layersToggle = layers ? layers.querySelector('.leaflet-control-layers-toggle') : null;
  const isMobile = window.matchMedia && window.matchMedia('(max-width: 720px)').matches;

  function setLegendCollapsed(collapsed){
    if(!legend) return;
    legend.classList.toggle('collapsed', collapsed);
    if(btn) btn.textContent = collapsed ? '展开' : '收起';
  }

  function setLayersExpanded(expanded){
    if(!layers) return;
    layers.classList.toggle('leaflet-control-layers-expanded', expanded);
  }

  // 1) 手机端：默认把图例折叠、把图层面板收起成按钮（避免两块大面板互相遮挡）
  if(isMobile){
    setLegendCollapsed(true);
    if(layers){
      // 你的地图是 collapsed=False（默认展开）。这里用 JS 强制“手机端收起”，体验更好。
      setLayersExpanded(false);
      if(layersToggle){
        layersToggle.addEventListener('click', function(e){
          e.preventDefault();
          const willExpand = !layers.classList.contains('leaflet-control-layers-expanded');
          setLayersExpanded(willExpand);
          if(willExpand) setLegendCollapsed(true); // 打开图层面板时自动收起图例
        }, { passive: false });
      }
    }
  }else{
    setLegendCollapsed(false);
  }

  // 2) 图例按钮：展开/收起（手机端展开前，先把图层面板收起）
  if(btn){
    btn.addEventListener('click', function(){
      if(!legend) return;
      if(isMobile && layers && layers.classList.contains('leaflet-control-layers-expanded')){
        setLayersExpanded(false);
      }
      setLegendCollapsed(!legend.classList.contains('collapsed'));
    });
  }

  // 3) 兜底：如果图层面板因为其它交互变成展开，也自动收起图例
  if(isMobile && layers){
    const obs = new MutationObserver(function(){
      if(layers.classList.contains('leaflet-control-layers-expanded')){
        setLegendCollapsed(true);
      }
    });
    obs.observe(layers, { attributes: true, attributeFilter: ['class'] });
  }
})();
</script>
